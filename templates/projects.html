{{define "title"}}Все проекты — СтроМенеджер{{end}}

{{define "content"}}
<div class="max-w-7xl mx-auto p-8">
    <a href="/" class="inline-flex items-center gap-2 text-orange-400 mb-8">← На дашборд</a>

    <div class="flex justify-between items-center mb-10">
        <h1 class="text-4xl font-semibold title">Все проекты</h1>
        <button onclick="document.getElementById('addProjectModal').classList.remove('hidden')" 
                class="bg-orange-500 hover:bg-orange-600 px-6 py-3 rounded-2xl flex items-center gap-2">
            <i class="fas fa-plus"></i> Новый проект
        </button>
    </div>

    {{if .}}
    <div class="grid gap-6">
        {{range .}}
        <div class="bg-slate-900 rounded-3xl p-7 flex flex-col md:flex-row gap-6">
            <div class="flex-1">
                <h3 class="text-2xl font-medium">{{.Name}}</h3>
                <p class="text-slate-400 mt-1">{{.Description}}</p>
                <div class="mt-6 h-3 bg-slate-700 rounded-full">
                    <div class="h-3 bg-orange-500 rounded-full" style="width: {{.Progress}}%"></div>
                </div>
            </div>
            <div class="text-right">
                <div class="text-5xl font-bold text-orange-400">{{.Progress}}%</div>
            </div>
            <a href="/project/{{.ID}}" class="bg-orange-500 hover:bg-orange-600 px-8 py-4 rounded-2xl">Открыть</a>
        </div>
        {{end}}
    </div>
    {{else}}
    <p class="text-slate-400 text-center py-20">Пока нет проектов</p>
    {{end}}
</div>


    <!-- ДОБАВИТЬ ОБЪЕКТ -->
    <div class="mt-10">
        <button onclick="showAddObjectModal()"
            class="bg-orange-500 px-6 py-3 rounded-2xl hover:bg-orange-600">
            + Добавить объект
        </button>
    </div>

</div>

<!-- МОДАЛКА ОБЪЕКТА -->
<div id="addObjectModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">
    <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-md">

        <h2 class="text-xl mb-4">Новый объект</h2>

        <form method="POST" action="/add-object">
            <input type="hidden" name="project_id" value="{{.Project.ID}}">

            <input type="text" name="name" placeholder="Название"
                class="w-full bg-slate-800 px-4 py-3 rounded-xl mb-4">

            <div class="flex gap-3">
                <button type="button" onclick="hideAddObjectModal()"
                    class="w-1/2 bg-slate-700 py-3 rounded-xl">
                    Отмена
                </button>

                <button type="submit"
                    class="w-1/2 bg-orange-500 py-3 rounded-xl">
                    Добавить
                </button>
            </div>
        </form>

    </div>
</div>

<script>
function showAddObjectModal() {
    document.getElementById('addObjectModal').classList.remove('hidden')
}

function hideAddObjectModal() {
    document.getElementById('addObjectModal').classList.add('hidden')
}
</script>

{{end}}
{{end}}
